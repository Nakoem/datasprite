logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: localhost
  port: 3306
  user: ${oc.env:DB_USER}
  password: ${oc.env:DB_PASSWORD}
  database: meta

db_dw:
  host: localhost
  port: 3306
  user: ${oc.env:DB_USER}
  password: ${oc.env:DB_PASSWORD}
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

redis:
  host: localhost
  port: 6379

es:
  host: localhost
  port: 9200
  index_name: data_agent

llm:
  model_name: qwen3.7-max
  api_key: ${oc.env:LLM_API_KEY}
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
