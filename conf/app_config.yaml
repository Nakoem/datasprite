logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: localhost
  port: 3306
  user: ${oc.env:DB_USER}
  password: ${oc.env:DB_PASSWORD}
  database: meta

db_dw:
  host: localhost
  port: 3306
  user: ${oc.env:DB_USER}
  password: ${oc.env:DB_PASSWORD}
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

redis:
  host: localhost
  port: 6379

es:
  host: localhost
  port: 9200
  index_name: data_agent

llm:
  model_name: qwen3.7-max-2026-05-17
  api_key: ${oc.env:LLM_API_KEY}
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # LLM 容错：单次请求超时 + 自动重试 + 降级模型
  request_timeout: 60
  max_retries: 3
  fallback_model: qwen-plus

rate_limit:
  enable: true
  # 豁免路径前缀：探活 / 监控 / 文档不限流
  exempt_paths:
    - /health
    - /metrics
    - /docs
    - /redoc
    - /openapi.json
  # 普通接口：每 IP 一个桶
  per_ip:
    capacity: 30
    refill_rate: 10
  # /api/query 收紧档：背后是多次 LLM 调用，又贵又慢
  per_ip_query:
    capacity: 5
    refill_rate: 0.5
  # 全局桶：所有请求共享的总闸，防分布式刷量烧穿 LLM 账单
  global_bucket:
    capacity: 100
    refill_rate: 50
