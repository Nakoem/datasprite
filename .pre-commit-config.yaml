repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: .venv/Scripts/python -m ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: .venv/Scripts/python -m ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: pytest
        name: Backend tests
        entry: .venv/Scripts/python -m pytest tests/ -v
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: frontend-lint
        name: Frontend lint (tsc)
        entry: bash -c "cd frontend && pnpm lint"
        language: system
        pass_filenames: false
        types_or: [ts, tsx]

      - id: frontend-test
        name: Frontend tests (vitest)
        entry: bash -c "cd frontend && pnpm test"
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
